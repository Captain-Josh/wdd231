<body id="service-page">
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="Final Project Logo">
            <span>PharmaCare Hub</span>
        </div>
        <div id="ham-menu">

        <nav class="navigation">

    <ul id="nav-mobile">
        <li><a href="index.html">Home</a></li>
        <li><a href="drug.html">Drug Info</a></li>
        <li class="current"><a href="services.html">Services</a></li>
    </ul>

    <main>

        <section class="services">
            <h2>Our Services</h2>
            <div class="container">

                <div class="service-container">
                    <div class="card">Drug Information</div>
                    <div class="card">Health Education</div>
                    <div class="card">Pharmacy Locator</div>
                </div>

                <div id="container">
                    <form method="get" action="thankyou.html">
                        <label>First Name <input type="text" name="first" required autocomplete="given-name"
                                title="Your First Name"></label>
                        <label>Last Name <input type="text" name="last" required autocomplete="family-name"
                                title="Your Last Name"></label>
                        <label>Cell Phone <input type="tel" name="phone" autocomplete="tel"
                                title="A Phone Number with dashes" required placeholder="987-555-1234"></label>
                        <label>Email <input type="email" name="email" required placeholder="john89@gmail.com"
                                title="Your Email" autocomplete="email"></label>

                        <label>Message<textarea name="message" required
                                title="Please enter your message"></textarea></label>

                        <input type="submit" value="Submit your message">
                    </form>

                    <section class="map-section">
                        <h2>Find Nearby Pharmacies</h2>

                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d5622.8188541533655!2d-111.8166758207275!3d40.38991148053312!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sen!2sng!4v1781513181911!5m2!1sen!2sng"
                            width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade"></iframe>

                    </section>

            
                </div>



            </div>
    </main>
